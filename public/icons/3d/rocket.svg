<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="rk-body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCFCFD"/>
      <stop offset="40%" stop-color="#E8E8EC"/>
      <stop offset="100%" stop-color="#60646C"/>
    </linearGradient>
    <radialGradient id="rk-win" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#FFF"/>
      <stop offset="40%" stop-color="#B7E0FE"/>
      <stop offset="100%" stop-color="#0090FF"/>
    </radialGradient>
    <linearGradient id="rk-fin" x1="0%" y1="0%" x2="100%" y2="100%">
