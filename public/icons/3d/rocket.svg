    <path d="M 50 28 Q 52 50, 54 80" stroke="#FFF" stroke-opacity="0.55" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 48 78 Q 64 82, 80 78 L 80 84 Q 64 88, 48 84 Z" fill="#000" fill-opacity="0.18"/>
